version: '3.9' # especifica a versão do Docker Compose a ser usada

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: acidentes_db
      CSV_PATH: /app/raw/acidentes_rodovias.csv
      #CSV_PATH: https://drive.google.com/file/d/1B-tw0W4UhqPQsCDaOXxyr4P9OVu91NhQ/view?usp=sharing
    ports:
      - "5432:5432"
    networks:
      - pipeline-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pipeline:
    build: .
    depends_on:
      - postgres
    networks:
      - pipeline-network
    environment:
      DB_HOST: postgres   # 🔥 nome do serviço
      DB_USER: admin
      DB_PASS: admin123
      DB_NAME: acidentes_db

networks:
  pipeline-network:

volumes:
  postgres_data: