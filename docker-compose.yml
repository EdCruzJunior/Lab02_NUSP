version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: acidentes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - docker_network

  pipeline:
    build: .
    container_name: ingestion_pipeline
    depends_on:
      - postgres
    networks:
      - docker_network

volumes:
  postgres_data:

networks:
  docker_network:
    driver: bridge
